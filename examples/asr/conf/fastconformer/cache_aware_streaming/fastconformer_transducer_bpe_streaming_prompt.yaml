# Cache-aware streaming FastConformer-Transducer (RNNT-only) ASR model with prompt support
# Combines cache-aware streaming encoder with prompt-based multilingual capability
# This is the RNNT-only variant (no auxiliary CTC head).

# You may find more detail:
# FastConformer here: https://docs.nvidia.com/deeplearning/nemo/user-guide/docs/en/stable/asr/models.html#fast-conformer
# Cache-aware Conformer here: https://docs.nvidia.com/deeplearning/nemo/user-guide/docs/en/stable/asr/models.html#cache-aware-streaming-conformer

name: "FastConformer-Transducer-BPE-Prompt-Streaming"

model:
  sample_rate: 16000
  compute_eval_loss: false
  log_prediction: true
  skip_nan_grad: false

  model_defaults:
    enc_hidden: ${model.encoder.d_model}
    pred_hidden: 640
    joint_hidden: 640
    initialize_prompt_feature: true
    num_prompts: 128
    norm: None
    prompt_dictionary: {
    'en-US': 0,
    'en': 0,
    'en-GB': 1,
    'enGB': 1,
    'es-ES': 2,
    'esES': 2,
    'es-US': 3,
    'es': 3,
    'zh-CN': 4,
    'zh-ZH': 4,
    'zh-TW': 5,
    'hi-IN': 6,
    'hi': 6,
    'hi-HI': 6,
    'ar-AR': 7,
    'ar': 7,
    'fr-FR': 8,
    'fr': 8,
    'de-DE': 9,
    'de': 9,
    'ja-JP': 10,
    'ja-JA': 10,
    'ru-RU': 11,
    'ru': 11,
    'pt-BR': 12,
    'pt-PT': 13,
    'pt': 13,
    'ko-KR': 14,
    'ko': 14,
    'ko-KO': 14,
    'it-IT': 15,
    'it': 15,
    'nl-NL': 16,
    'nl': 16,
    'pl-PL': 17,
    'pl': 17,
    'tr-TR': 18,
    'tr': 18,
    'uk-UA': 19,
    'uk': 19,
    'ro-RO': 20,
    'ro': 20,
    'el-GR': 21,
    'el': 21,
    'cs-CZ': 22,
    'cs': 22,
    'hu-HU': 23,
    'hu': 23,
    'sv-SE': 24,
    'sv': 24,
    'da-DK': 25,
    'da': 25,
    'fi-FI': 26,
    'fi': 26,
    'no-NO': 27,
    'no': 27,
    'nb-NO': 103,
    'nb': 103,
    'sk-SK': 28,
    'sk': 28,
    'hr-HR': 29,
    'hr': 29,
    'bg-BG': 30,
    'bg': 30,
    'lt-LT': 31,
    'lt': 31,
    'et-EE': 60,
    'et': 60,
    'lv-LV': 61,
    'lv': 61,
    'sl-SI': 62,
    'sl': 62,
    'th-TH': 32,
    'vi-VN': 33,
    'id-ID': 34,
    'ms-MY': 35,
    'bn-IN': 36,
    'ur-PK': 37,
    'fa-IR': 38,
    'ta-IN': 39,
    'te-IN': 40,
    'mr-IN': 41,
    'gu-IN': 42,
    'kn-IN': 43,
    'ml-IN': 44,
    'si-LK': 45,
    'ne-NP': 46,
    'km-KH': 47,
    'sw-KE': 48,
    'am-ET': 49,
    'ha-NG': 50,
    'zu-ZA': 51,
    'yo-NG': 52,
    'ig-NG': 53,
    'af-ZA': 54,
    'rw-RW': 55,
    'so-SO': 56,
    'ny-MW': 57,
    'ln-CD': 58,
    'or-KE': 59,
    'he-IL': 64,
    'ku-TR': 65,
    'az-AZ': 66,
    'ka-GE': 67,
    'hy-AM': 68,
    'uz-UZ': 69,
    'tg-TJ': 70,
    'ky-KG': 71,
    'qu-PE': 80,
    'ay-BO': 81,
    'gn-PY': 82,
    'nah-MX': 83,
    'mi-NZ': 96,
    'haw-US': 97,
    'sm-WS': 98,
    'to-TO': 99,
    'fr-CA': 100,
    'mt-MT': 102,
    'auto': 101
    }

  train_ds:
    manifest_filepath: ???
    sample_rate: ${model.sample_rate}
    use_lhotse: true
    batch_duration: 400
    quadratic_duration: 15
    num_buckets: 30
    shuffle: true
    num_workers: 8
    pin_memory: true
    max_duration: 39.99
    min_duration: 0.1
    is_tarred: true
    tarred_audio_filepaths: null
    slice_length: 100
    bucketing_batch_size: null
    bucket_buffer_size: 10000
    shuffle_buffer_size: 10000
    prompt_dictionary: ${model.model_defaults.prompt_dictionary}
    num_prompts: ${model.model_defaults.num_prompts}
    subsampling_factor: ${model.encoder.subsampling_factor}
    lang_field: target_lang

    # Per-dataset prompt mode — controls how language prompts are selected during training.
    # The mode is set per data source via lhotse input_cfg tags:
    #   tags: { prompt_mode: unified }
    #
    # Supported prompt_mode values:
    #   "langID"  — always pass the real language ID (use for AST / language-forced tasks)
    #   "auto"    — always pass auto/language-agnostic prompt (use for code-switching)
    #   "unified" — randomly choose auto vs lang ID (use for multilingual ASR, default)
    #
    # unified_auto_ratio controls the probability of selecting auto in "unified" mode.
    prompt_mode_field: prompt_mode
    default_prompt_mode: unified
    unified_auto_ratio: 0.5

  validation_ds:
    manifest_filepath: ???
    sample_rate: ${model.sample_rate}
    batch_size: 2
    shuffle: false
    use_start_end_token: false
    num_workers: 2
    pin_memory: true
    batch_duration: null
    use_lhotse: true
    use_bucketing: false
    prompt_dictionary: ${model.model_defaults.prompt_dictionary}
    num_prompts: ${model.model_defaults.num_prompts}
    subsampling_factor: ${model.encoder.subsampling_factor}
    lang_field: target_lang

  test_ds:
    manifest_filepath: null
    sample_rate: ${model.sample_rate}
    batch_size: 16
    shuffle: false
    use_start_end_token: false
    num_workers: 8
    pin_memory: true
    use_lhotse: true
    use_bucketing: false
    prompt_dictionary: ${model.model_defaults.prompt_dictionary}
    num_prompts: ${model.model_defaults.num_prompts}
    subsampling_factor: ${model.encoder.subsampling_factor}
    lang_field: target_lang
    default_prompt_mode: langID

  tokenizer:
    dir: ???
    type: bpe

  preprocessor:
    _target_: nemo.collections.asr.modules.AudioToMelSpectrogramPreprocessor
    sample_rate: ${model.sample_rate}
    normalize: "NA"
    window_size: 0.025
    window_stride: 0.01
    window: "hann"
    features: 128
    n_fft: 512
    frame_splicing: 1
    dither: 0.00001
    pad_to: 0

  spec_augment:
    _target_: nemo.collections.asr.modules.SpectrogramAugmentation
    freq_masks: 2
    time_masks: 10
    freq_width: 27
    time_width: 0.05

  encoder:
    _target_: nemo.collections.asr.modules.ConformerEncoder
    feat_in: ${model.preprocessor.features}
    feat_out: -1
    n_layers: 42
    d_model: 1024
    use_bias: false

    subsampling: dw_striding
    subsampling_factor: 8
    subsampling_conv_channels: 256
    causal_downsampling: true

    reduction: null
    reduction_position: null
    reduction_factor: 1

    ff_expansion_factor: 4

    self_attention_model: rel_pos
    n_heads: 8
    att_context_size: [70, 6]
    att_context_probs: null
    att_context_style: chunked_limited
    xscaling: false
    untie_biases: true
    pos_emb_max_len: 5000

    conv_kernel_size: 9
    conv_norm_type: 'layer_norm'
    conv_context_size: causal

    dropout: 0.1
    dropout_pre_encoder: 0.1
    dropout_emb: 0.0
    dropout_att: 0.1

    stochastic_depth_drop_prob: 0.0
    stochastic_depth_mode: linear
    stochastic_depth_start_layer: 1

  decoder:
    _target_: nemo.collections.asr.modules.RNNTDecoder
    normalization_mode: null
    random_state_sampling: false
    blank_as_pad: true

    prednet:
      pred_hidden: ${model.model_defaults.pred_hidden}
      pred_rnn_layers: 2
      t_max: null
      dropout: 0.2

  joint:
    _target_: nemo.collections.asr.modules.RNNTJoint
    log_softmax: null
    preserve_memory: false

    fuse_loss_wer: true
    fused_batch_size: 2

    jointnet:
      joint_hidden: ${model.model_defaults.joint_hidden}
      activation: "relu"
      dropout: 0.2

  decoding:
    strategy: "greedy_batch"
    # Strip language-ID tags (e.g. <en-US>) from decoded output during inference.
    strip_lang_tags: true

    greedy:
      max_symbols: 10

    beam:
      beam_size: 2
      return_best_hypothesis: False
      score_norm: true
      tsd_max_sym_exp: 50
      alsd_max_target_len: 2.0

  interctc:
    loss_weights: []
    apply_at_layers: []

  loss:
    loss_name: "default"

    warprnnt_numba_kwargs:
      fastemit_lambda: 5e-3
      clamp: -1.0

  variational_noise:
    start_step: 0
    std: 0.0

  optim:
    name: adamw
    lr: 2.0
    betas: [0.9, 0.98]
    weight_decay: 1e-3

    sched:
      name: NoamAnnealing
      d_model: ${model.encoder.d_model}
      warmup_steps: 10000
      warmup_ratio: null
      min_lr: 1e-6

trainer:
  devices: -1
  num_nodes: 1
  max_epochs: -1
  max_steps: 500000
  val_check_interval: 0.5
  accelerator: auto
  strategy:
    _target_: lightning.pytorch.strategies.DDPStrategy
    gradient_as_bucket_view: true
  accumulate_grad_batches: 1
  gradient_clip_val: 0.5
  precision: bf16
  log_every_n_steps: 100
  enable_progress_bar: True
  num_sanity_val_steps: 0
  sync_batchnorm: true
  enable_checkpointing: False
  logger: false
  benchmark: false
  use_distributed_sampler: false
  limit_train_batches: 1000


exp_manager:
  exp_dir: null
  name: ${name}
  create_tensorboard_logger: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: "val_wer"
    mode: "min"
    save_top_k: 5
    always_save_nemo: True
  resume_if_exists: false
  resume_ignore_no_checkpoint: false

  create_wandb_logger: false
  wandb_logger_kwargs:
    name: null
    project: null
